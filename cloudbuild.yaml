steps:
  # 0. Quality Gates: Lint & Test
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci']
    dir: 'web'
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'lint']
    dir: 'web'
    
  - name: 'mcr.microsoft.com/dotnet/sdk:8.0'
    entrypoint: 'dotnet'
    args: ['build', 'AgencyCrm.sln', '-c', 'Release']
    dir: 'backend'
  # Note: Integration tests are skipped in Cloud Build by default as they require a Postgres instance. 
  # We focus on Unit tests here.
  - name: 'mcr.microsoft.com/dotnet/sdk:8.0'
    entrypoint: 'dotnet'
    args: ['test', 'Crm.UnitTests/Crm.UnitTests.csproj', '-c', 'Release']
    dir: 'backend'

  # 1. Build & Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/crm-api', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/crm-api']

  # 2. Build & Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/crm-web', './web']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/crm-web']

  # 3. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'crm-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/crm-api'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'

  # 4. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'crm-web'
      - '--image'
      - 'gcr.io/$PROJECT_ID/crm-web'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'

images:
  - 'gcr.io/$PROJECT_ID/crm-api'
  - 'gcr.io/$PROJECT_ID/crm-web'
