name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      ASPNETCORE_ENVIRONMENT: Development

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agency_crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    # Backend
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore backend/AgencyCrm.sln

    - name: Build Backend
      run: dotnet build backend/AgencyCrm.sln --no-restore

    - name: Run Backend Tests
      run: dotnet test backend/AgencyCrm.sln --no-build --verbosity normal --logger "console;verbosity=detailed"
      env:
        ConnectionStrings__Default: Host=localhost;Database=agency_crm;Username=postgres;Password=postgres
        Jwt__Key: ci_test_secret_key_long_enough_for_validation_32_chars!

    # Frontend
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install Frontend Dependencies
      run: cd web && npm ci

    - name: Lint Frontend
      run: cd web && npm run lint

    - name: Build Frontend
      run: cd web && npm run build
      env:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

    - name: Run Frontend Tests
      run: cd web && npx vitest run
